services:
  postgres:
    image: postgres:16-alpine
    container_name: enter-container_name
    restart: unless-stopped

    environment:
      POSTGRES_DB: enter_db
      POSTGRES_USER: enter_user
      POSTGRES_PASSWORD: enter_password

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - weldomat_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weldomat -d weldomat_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  weldomat_pg_data:
