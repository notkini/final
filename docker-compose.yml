services:
  postgres:
    image: postgres:16-alpine
    container_name: weldomat_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: weldomat_monitor
      POSTGRES_USER: weldomat
      POSTGRES_PASSWORD: weldomat

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - weldomat_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weldomat -d weldomat_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  weldomat_pg_data:
